<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Racer Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="score-container">
        <div class="score-box">
            <span>Score : </span>
            <span id="score-val">0</span>
        </div>
    </div>

    <div id="game-area">
        <div class="road-border left"></div>
        <div class="road-line-center"></div>
        <div class="road-border right"></div>

        <div id="start-screen" class="screen">
            <button id="play-btn">PLAY</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <div class="game-over-title">
                <span class="red">G</span><span class="red">A</span><span class="blue">M</span><span class="blue">E</span><br>
                <span class="red">O</span><span class="red">V</span><span class="blue">E</span><span class="yellow">R</span>
            </div>
            <div class="stats">
                <p>Your Score : <span id="final-score" class="red-text">0</span></p>
                <p>High Score : <span id="high-score" class="blue-text">0</span></p>
            </div>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <div class="info-container">
        <h1><u>Traffic Racer</u></h1>
        <h2>HTML, CSS, JQuery</h2>
        <br>
        <p>Developed By Chathunga Bimsara @ IJSE</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
